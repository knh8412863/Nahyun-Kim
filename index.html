<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>김나현 Resume</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
        color: #111;
        background: #fdeff3;
      }

      main {
        width: min(100%, 520px);
        min-height: 100vh;
        margin: 0 auto;
        padding: 64px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .profile {
        width: 168px;
        height: 168px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #fff;
        box-shadow: 0 16px 36px rgba(17, 17, 17, 0.14);
      }

      h1 {
        margin: 28px 0 8px;
        font-size: 2rem;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #555;
        font-size: 1rem;
      }

      .actions {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 36px;
      }

      .actions a {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 18px;
        border: 1px solid #222;
        border-radius: 8px;
        color: #111;
        background: #fff;
        font-size: 0.98rem;
        font-weight: 700;
        text-decoration: none;
        transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }

      .actions a:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 22px rgba(17, 17, 17, 0.12);
      }

      .actions a:first-child {
        color: #fff;
        background: #111;
      }

      @media (max-width: 480px) {
        main {
          padding: 48px 20px;
        }

        .profile {
          width: 144px;
          height: 144px;
        }

        .actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img class="profile" src="profile.png" alt="김나현 프로필 사진" />
      <h1>김나현 _ Nahyun Kim</h1>
      <p>Backend / Infra Engineer</p>

      <div class="actions" aria-label="이력서 언어 선택">
        <a href="resume_kor.html"> 🇰🇷 한글 이력서</a>
        <a href="resume_eng.html"> 🇺🇸 English Resume</a>
      </div>
    </main>
  </body>
</html>
